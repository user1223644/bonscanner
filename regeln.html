<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regeln | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="static/js/theme-init.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-card: #fff;
        --bg-hover: #fafafa;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-color: #eee;
        --border-light: #f0f0f0;
        --accent: #f5a623;
        --accent-bg: #fff8f0;
      }

      [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border-color: #30363d;
        --border-light: #21262d;
        --accent: #f5a623;
        --accent-bg: rgba(245, 166, 35, 0.15);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 220px;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }

      .logo-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .nav-menu {
        list-style: none;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .theme-toggle {
        background: var(--bg-hover);
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        margin-top: auto;
      }
      .theme-toggle:hover {
        background: var(--border-color);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
        display: flex;
        flex-direction: column;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .management-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        overflow: hidden;
        flex: 1;
        min-height: 0;
        --rule-columns:
          minmax(140px, 1.1fr)
          minmax(120px, 0.9fr)
          minmax(120px, 0.9fr)
          minmax(180px, 1.6fr)
          minmax(64px, 0.5fr)
          32px
          72px;
      }

      .management-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .management-title {
        font-size: 1rem;
        font-weight: 600;
      }

      .management-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: auto;
        padding-right: 0.35rem;
        scrollbar-gutter: stable;
      }

      .rule-header {
        display: grid;
        grid-template-columns: var(--rule-columns);
        gap: 0.5rem;
        align-items: end;
        padding: 0.35rem 0 0.65rem;
        border-bottom: 1px solid var(--border-light);
        color: var(--text-muted);
        font-size: 0.72rem;
        min-width: 760px;
        position: sticky;
        top: 0;
        background: var(--bg-card);
        z-index: 2;
      }

      .rule-rows {
        min-width: 760px;
      }

      .rule-header-cell {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }

      .rule-header-label {
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.68rem;
      }

      .rule-header-help {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: none;
        letter-spacing: 0;
      }

      .rule-header-cell.align-center {
        text-align: center;
      }

      .rule-header-cell.align-end {
        text-align: right;
      }

      .rule-row {
        display: grid;
        grid-template-columns: var(--rule-columns);
        gap: 0.5rem;
        align-items: center;
        padding: 0.35rem 0;
        border-bottom: 1px solid var(--border-light);
        min-width: 760px;
      }

      .rule-row:last-child {
        border-bottom: none;
      }

      .rule-input,
      .rule-select {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.25rem 0.4rem;
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 0.82rem;
        width: 100%;
        min-width: 0;
      }

      .rule-actions {
        display: flex;
        gap: 0.35rem;
        align-items: center;
        white-space: nowrap;
        justify-self: end;
      }

      .rule-active {
        justify-self: center;
      }

      .btn-small {
        padding: 0.35rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: var(--bg-hover);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 0.8rem;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-hover);
        color: var(--text-primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }

      .icon-btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .icon-btn.danger {
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.4);
      }

      .btn-small.danger {
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.4);
      }

      .empty-hint {
        color: var(--text-muted);
        font-size: 0.85rem;
        padding: 0.75rem 0;
      }

      .fab {
        position: fixed;
        right: 2rem;
        bottom: 2rem;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 1.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        z-index: 50;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 60;
        padding: 1.5rem;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal-card {
        width: 100%;
        max-width: 520px;
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .modal-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .modal-body {
        display: grid;
        gap: 0.75rem;
      }

      .modal-field {
        display: grid;
        gap: 0.35rem;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .fab {
          right: 1.25rem;
          bottom: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="kategorien.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 4h7v7H4z" />
              <path d="M13 4h7v7h-7z" />
              <path d="M4 13h7v7H4z" />
              <path d="M13 13h7v7h-7z" />
            </svg>
            Kategorien
          </a>
        </li>
        <li>
          <a href="regeln.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>
            Regeln
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Regeln</h1>
      <div class="content">
        <div class="management-card">
          <div class="management-header">
            <span class="management-title">Regeln verwalten</span>
          </div>
          <div id="rules-list" class="management-list">
            <div class="rule-header">
              <div class="rule-header-cell">
                <span class="rule-header-label">Kategorie</span>
                <span class="rule-header-help">Zielkategorie</span>
              </div>
              <div class="rule-header-cell">
                <span class="rule-header-label">Typ</span>
                <span class="rule-header-help">Feldquelle</span>
              </div>
              <div class="rule-header-cell">
                <span class="rule-header-label">Match</span>
                <span class="rule-header-help">Vergleich</span>
              </div>
              <div class="rule-header-cell">
                <span class="rule-header-label">Pattern</span>
                <span class="rule-header-help">Suchtext</span>
              </div>
              <div class="rule-header-cell">
                <span class="rule-header-label">Prio</span>
                <span class="rule-header-help">Höher gewinnt</span>
              </div>
              <div class="rule-header-cell align-center">
                <span class="rule-header-label">Aktiv</span>
                <span class="rule-header-help">An/Aus</span>
              </div>
              <div class="rule-header-cell align-end">
                <span class="rule-header-label">Aktion</span>
                <span class="rule-header-help">Speichern/Löschen</span>
              </div>
            </div>
            <div id="rules-rows" class="rule-rows">
              Lade Regeln...
            </div>
          </div>
        </div>
      </div>
    </main>

    <button class="fab" id="open-rule-modal" aria-label="Regel hinzufügen">+</button>

    <div id="rule-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="rule-modal-title">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="rule-modal-title">Neue Regel</h2>
        </div>
        <div class="modal-body">
          <label class="modal-field">
            Kategorie
            <select id="rule-category" class="rule-select"></select>
          </label>
          <label class="modal-field">
            Typ
            <select id="rule-type" class="rule-select">
              <option value="store">Geschäft</option>
              <option value="keyword">Keyword</option>
              <option value="payment">Zahlung</option>
              <option value="item">Artikel</option>
            </select>
          </label>
          <label class="modal-field">
            Match
            <select id="rule-match" class="rule-select">
              <option value="contains">Enthält</option>
              <option value="equals">Gleich</option>
              <option value="regex">Regex</option>
            </select>
          </label>
          <label class="modal-field">
            Pattern
            <input type="text" id="rule-pattern" class="rule-input" placeholder="Pattern" />
          </label>
          <label class="modal-field">
            Priorität
            <input
              type="text"
              inputmode="numeric"
              id="rule-priority"
              class="rule-input"
              placeholder="Prio"
              value="100"
            />
          </label>
          <label class="modal-field">
            Aktiv
            <input type="checkbox" id="rule-active" checked />
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn-small" id="cancel-rule-btn">Abbrechen</button>
          <button class="btn-small btn-primary" id="add-rule-btn">Erstellen</button>
        </div>
      </div>
    </div>

    <script src="static/js/constants.js" defer></script>
    <script src="static/js/api.js" defer></script>
    <script src="static/js/theme.js" defer></script>
    <script src="static/js/rules.js" defer></script>
  </body>
</html>
