<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kategorien | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/css/base.css" />
    <script src="static/js/core/theme-init.js"></script>
    <style>

      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
        display: flex;
        flex-direction: column;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .content {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .management-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        overflow: hidden;
        width: 100%;
        flex: 1;
        min-height: 0;
      }

      .management-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .management-title {
        font-size: 1rem;
        font-weight: 600;
      }

      .management-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 0.35rem;
        scrollbar-gutter: stable;
      }

      .category-row {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) 28px 72px;
        gap: 0.6rem;
        align-items: center;
        padding: 0.4rem 0;
        border-bottom: 1px solid var(--border-light);
        min-width: 420px;
      }

      .category-row.removing {
        overflow: hidden;
        transition:
          height 0.22s ease,
          opacity 0.22s ease,
          margin 0.22s ease,
          padding 0.22s ease,
          border 0.22s ease;
      }

      .category-row.flash {
        animation: row-flash 0.8s ease;
      }

      .category-row:last-child {
        border-bottom: none;
      }

      .category-name-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.25rem 0.45rem;
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 0.82rem;
        width: 100%;
        min-width: 0;
      }

      .category-color-input,
      #new-category-color {
        -webkit-appearance: none;
        appearance: none;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 0;
        background: transparent;
        cursor: pointer;
        margin: 0;
      }

      .category-actions {
        display: flex;
        gap: 0.35rem;
        align-items: center;
        white-space: nowrap;
      }

      .category-usage {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: center;
      }

      .btn-small {
        padding: 0.35rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: var(--bg-hover);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 0.8rem;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-hover);
        color: var(--text-primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
        opacity: 0.65;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .icon-btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .icon-btn.danger {
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.4);
      }

      .icon-btn.loading {
        pointer-events: none;
        opacity: 0.5;
      }

      .icon-btn:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      .category-row:hover .icon-btn {
        opacity: 1;
      }

      .btn-small.danger {
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.4);
      }

      .empty-hint {
        color: var(--text-muted);
        font-size: 0.85rem;
        padding: 0.75rem 0;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 0.75rem;
        color: var(--text-secondary);
        padding: 3rem 1rem;
        animation: fade-in 0.3s ease;
      }

      .empty-state strong {
        color: var(--text-primary);
        font-size: 1.05rem;
      }

      .fab {
        position: fixed;
        right: 2rem;
        bottom: 2rem;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 1.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        z-index: 50;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 60;
        padding: 1.5rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        transform: scale(0.96);
        opacity: 0;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .modal-overlay.show .modal-card {
        transform: scale(1);
        opacity: 1;
      }

      .modal-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .modal-body {
        display: grid;
        gap: 0.75rem;
      }

      .modal-body label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .modal-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.4rem 0.55rem;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 0.9rem;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .toast-container {
        position: fixed;
        right: 1.5rem;
        bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        z-index: 80;
      }

      .toast {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.6rem 0.9rem;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        font-size: 0.85rem;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        border-color: rgba(239, 68, 68, 0.5);
        color: #ef4444;
      }

      .toast button {
        background: none;
        border: none;
        color: var(--accent);
        font-weight: 600;
        cursor: pointer;
        padding: 0;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes row-flash {
        0% {
          background: rgba(34, 197, 94, 0.18);
        }
        100% {
          background: transparent;
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .category-row {
          min-width: 0;
          grid-template-columns: 28px minmax(0, 1fr) 24px 64px;
        }
        .fab {
          right: 1.25rem;
          bottom: 1.25rem;
        }
        .toast-container {
          right: 1rem;
          left: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="kategorien.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 4h7v7H4z" />
              <path d="M13 4h7v7h-7z" />
              <path d="M4 13h7v7H4z" />
              <path d="M13 13h7v7h-7z" />
            </svg>
            Kategorien
          </a>
        </li>
        <li>
          <a href="regeln.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>
            Regeln
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Kategorien</h1>
      <div class="content">
        <div class="management-card">
          <div class="management-header">
            <span class="management-title">Kategorien verwalten</span>
          </div>
          <div id="categories-list" class="empty-hint management-list">
            Lade Kategorien...
          </div>
        </div>
      </div>
    </main>

    <button class="fab" id="open-category-modal" aria-label="Kategorie hinzufügen">+</button>

    <div id="category-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="category-modal-title">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="category-modal-title">Neue Kategorie</h2>
        </div>
        <div class="modal-body">
          <input
            type="text"
            id="new-category-name"
            class="modal-input"
            placeholder="Name der Kategorie"
          />
          <label>
            Farbe
            <input type="color" id="new-category-color" value="#f5a623" />
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn-small" id="cancel-category-btn">Abbrechen</button>
          <button class="btn-small btn-primary" id="create-category-btn">Erstellen</button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="static/js/core/constants.js" defer></script>
    <script src="static/js/core/api.js" defer></script>
    <script src="static/js/core/dom.js" defer></script>
    <script src="static/js/core/theme.js" defer></script>
    <script src="static/js/core/ui.js" defer></script>
    <script src="static/js/features/categories.js" defer></script>
  </body>
</html>
