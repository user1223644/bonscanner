<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alle Belege | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/css/base.css" />
    <script src="static/js/core/theme-init.js"></script>
    <style>

      /* Sidebar */

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .table-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 500;
        background: var(--bg-hover);
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .editable {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        transition: background 0.2s;
      }
      .editable:hover {
        background: var(--bg-hover);
      }

      .edit-input {
        -webkit-appearance: none;
        appearance: none;
        box-sizing: border-box;
        font: inherit;
        line-height: inherit;
        padding: 0.25rem 0.5rem;
        border: 0;
        box-shadow: 0 0 0 1px var(--accent);
        border-radius: 4px;
        background: var(--bg-card);
        color: var(--text-primary);
        width: 100%;
        min-width: 0;
        max-width: 100%;
        margin: 0;
        vertical-align: middle;
        outline: none;
      }

      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .category-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-right: 0.25rem;
      }

      .add-category {
        display: inline-block;
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .add-category:hover {
        background: var(--border-color);
      }

      .delete-tag-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.6;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0 0 0 0.25rem;
        margin-left: 0.25rem;
        transition: opacity 0.2s;
      }
      .delete-tag-btn:hover {
        opacity: 1;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }

      .detail-btn {
        background: none;
        border: none;
        padding: 0.25rem;
        cursor: pointer;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .detail-btn:hover {
        background: var(--bg-hover);
        color: var(--accent);
      }
      .detail-btn svg {
        transition: transform 0.2s;
      }

      .detail-row {
        background: var(--bg-hover);
      }
      .detail-content {
        padding: 1rem;
        font-size: 0.9rem;
      }

      .detail-section {
        margin-bottom: 1rem;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .add-item-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.35rem 0.75rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .add-item-btn:hover {
        opacity: 0.9;
      }

      .add-item-form {
        background: var(--bg-card);
        padding: 1rem;
        border-radius: 6px;
        margin-top: 0.5rem;
        border: 1px solid var(--border-color);
      }
      .item-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.5rem;
        border-radius: 4px;
        margin-right: 0.5rem;
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .item-input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .save-btn,
      .cancel-btn {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .save-btn {
        background: var(--accent);
        color: white;
        margin-right: 0.5rem;
      }
      .save-btn:hover {
        opacity: 0.9;
      }
      .cancel-btn {
        background: var(--bg-hover);
        color: var(--text-secondary);
      }
      .cancel-btn:hover {
        background: var(--border-color);
      }

      .delete-item-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
        padding: 0.25rem 0.5rem;
        transition: color 0.2s;
      }
      .delete-item-btn:hover {
        color: #ef4444;
      }

      .items-list {
        margin-top: 0.5rem;
      }

      .item-meta {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.15rem;
      }

      .item-categories {
        margin-top: 0.25rem;
      }

      .item-category-btn {
        background: var(--bg-hover);
        border: none;
        color: var(--text-secondary);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.75rem;
      }
      .item-category-btn:hover {
        background: var(--border-color);
      }

      .taxes-list {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      /* Filter Section */
      .filter-section {
        background: var(--bg-card);
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        margin-bottom: 1.5rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-input {
        flex: 1;
        min-width: 150px;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 0.9rem;
        transition: border-color 0.2s;
      }

      .filter-input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .clear-filters-btn {
        padding: 0.6rem 1.25rem;
        background: var(--bg-hover);
        color: var(--text-secondary);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .clear-filters-btn:hover {
        background: var(--border-color);
      }

      .pagination {
        margin-top: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .page-btn {
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .filter-section {
          flex-direction: column;
        }
        .filter-input {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="app-shell">
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="kategorien.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 4h7v7H4z" />
              <path d="M13 4h7v7h-7z" />
              <path d="M4 13h7v7H4z" />
              <path d="M13 13h7v7h-7z" />
            </svg>
            Kategorien
          </a>
        </li>
        <li>
          <a href="regeln.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>
            Regeln
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Alle Belege</h1>

      <!-- Search & Filter Section -->
      <div class="filter-section">
        <input
          type="text"
          id="text-filter"
          class="filter-input"
          placeholder="Textsuche (Geschäft, Artikel...)"
        />
        <input
          type="text"
          id="store-filter"
          class="filter-input"
          placeholder="Nach Geschäft suchen..."
        />
        <input
          type="date"
          id="date-from-filter"
          class="filter-input"
          placeholder="Von Datum"
        />
        <input
          type="date"
          id="date-to-filter"
          class="filter-input"
          placeholder="Bis Datum"
        />
        <input
          type="text"
          id="amount-min-filter"
          class="filter-input"
          placeholder="Min. Betrag"
          data-numeric="true"
        />
        <input
          type="text"
          id="amount-max-filter"
          class="filter-input"
          placeholder="Max. Betrag"
          data-numeric="true"
        />
        <input
          type="text"
          id="payment-filter"
          class="filter-input"
          placeholder="Zahlungsart"
        />
        <select id="label-filter" class="filter-input">
          <option value="">Alle Kategorien</option>
        </select>
        <button class="clear-filters-btn" onclick="clearFilters()">
          Filter zurücksetzen
        </button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Geschäft</th>
              <th></th>
              <th>Kategorie</th>
              <th>Zahlungsart</th>
              <th>Betrag</th>
            </tr>
          </thead>
          <tbody id="receipts-body">
            <tr>
              <td colspan="6" class="empty-state">Lade Belege...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination">
        <button class="page-btn" id="prev-page" disabled>Zurück</button>
        <span id="page-info">Seite 1 von 1</span>
        <button class="page-btn" id="next-page" disabled>Weiter</button>
      </div>
    </main>

    <script src="static/js/core/constants.js" defer></script>
    <script src="static/js/core/api.js" defer></script>
    <script src="static/js/core/theme.js" defer></script>
    <script src="static/js/features/receipts.js" defer></script>
  </body>
</html>
