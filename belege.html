<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alle Belege | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="static/js/theme-init.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-card: #fff;
        --bg-hover: #fafafa;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-color: #eee;
        --border-light: #f0f0f0;
        --accent: #f5a623;
        --accent-bg: #fff8f0;
      }

      [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border-color: #30363d;
        --border-light: #21262d;
        --accent: #f5a623;
        --accent-bg: rgba(245, 166, 35, 0.15);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      .logo-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .nav-menu {
        list-style: none;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .theme-toggle {
        background: var(--bg-hover);
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        margin-top: auto;
      }
      .theme-toggle:hover {
        background: var(--border-color);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .table-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 500;
        background: var(--bg-hover);
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .editable {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .editable:hover {
        background: var(--bg-hover);
      }

      .edit-input {
        padding: 0.25rem 0.5rem;
        border: 1px solid var(--accent);
        border-radius: 4px;
        font-size: 0.85rem;
        background: var(--bg-card);
        color: var(--text-primary);
        width: 100%;
        outline: none;
      }

      .category-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-right: 0.25rem;
      }

      .add-category {
        display: inline-block;
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .add-category:hover {
        background: var(--border-color);
      }

      .delete-tag-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.6;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0 0 0 0.25rem;
        margin-left: 0.25rem;
        transition: opacity 0.2s;
      }
      .delete-tag-btn:hover {
        opacity: 1;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }

      .detail-btn {
        background: none;
        border: none;
        padding: 0.25rem;
        cursor: pointer;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .detail-btn:hover {
        background: var(--bg-hover);
        color: var(--accent);
      }
      .detail-btn svg {
        transition: transform 0.2s;
      }

      .detail-row {
        background: var(--bg-hover);
      }
      .detail-content {
        padding: 1rem;
        font-size: 0.9rem;
      }

      .detail-section {
        margin-bottom: 1rem;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .add-item-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.35rem 0.75rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .add-item-btn:hover {
        opacity: 0.9;
      }

      .add-item-form {
        background: var(--bg-card);
        padding: 1rem;
        border-radius: 6px;
        margin-top: 0.5rem;
        border: 1px solid var(--border-color);
      }
      .item-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.5rem;
        border-radius: 4px;
        margin-right: 0.5rem;
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .item-input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .save-btn,
      .cancel-btn {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .save-btn {
        background: var(--accent);
        color: white;
        margin-right: 0.5rem;
      }
      .save-btn:hover {
        opacity: 0.9;
      }
      .cancel-btn {
        background: var(--bg-hover);
        color: var(--text-secondary);
      }
      .cancel-btn:hover {
        background: var(--border-color);
      }

      .delete-item-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
        padding: 0.25rem 0.5rem;
        transition: color 0.2s;
      }
      .delete-item-btn:hover {
        color: #ef4444;
      }

      .items-list {
        margin-top: 0.5rem;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Alle Belege</h1>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Geschäft</th>
              <th></th>
              <th>Kategorie</th>
              <th>Betrag</th>
            </tr>
          </thead>
          <tbody id="receipts-body">
            <tr>
              <td colspan="5" class="empty-state">Lade Belege...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="static/js/constants.js" defer></script>
    <script src="static/js/api.js" defer></script>
    <script src="static/js/theme.js" defer></script>
    <script src="static/js/receipts.js" defer></script>
  </body>
</html>
