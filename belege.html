<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alle Belege | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      if (localStorage.getItem("theme") === "dark")
        document.documentElement.setAttribute("data-theme", "dark");
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-card: #fff;
        --bg-hover: #fafafa;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-color: #eee;
        --border-light: #f0f0f0;
        --accent: #f5a623;
        --accent-bg: #fff8f0;
      }

      [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border-color: #30363d;
        --border-light: #21262d;
        --accent: #f5a623;
        --accent-bg: rgba(245, 166, 35, 0.15);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      .logo-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .nav-menu {
        list-style: none;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .theme-toggle {
        background: var(--bg-hover);
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        margin-top: auto;
      }
      .theme-toggle:hover {
        background: var(--border-color);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .table-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 500;
        background: var(--bg-hover);
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .editable {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .editable:hover {
        background: var(--bg-hover);
      }

      .edit-input {
        padding: 0.25rem 0.5rem;
        border: 1px solid var(--accent);
        border-radius: 4px;
        font-size: 0.85rem;
        background: var(--bg-card);
        color: var(--text-primary);
        width: 100%;
        outline: none;
      }

      .category-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-right: 0.25rem;
      }

      .add-category {
        display: inline-block;
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .add-category:hover {
        background: var(--border-color);
      }

      .delete-tag-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.6;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0 0 0 0.25rem;
        margin-left: 0.25rem;
        transition: opacity 0.2s;
      }
      .delete-tag-btn:hover {
        opacity: 1;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }

      .detail-btn {
        background: none;
        border: none;
        padding: 0.25rem;
        cursor: pointer;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .detail-btn:hover {
        background: var(--bg-hover);
        color: var(--accent);
      }
      .detail-btn svg {
        transition: transform 0.2s;
      }

      .detail-row {
        background: var(--bg-hover);
      }
      .detail-content {
        padding: 1rem;
        font-size: 0.9rem;
      }

      .detail-section {
        margin-bottom: 1rem;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .add-item-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.35rem 0.75rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .add-item-btn:hover {
        opacity: 0.9;
      }

      .add-item-form {
        background: var(--bg-card);
        padding: 1rem;
        border-radius: 6px;
        margin-top: 0.5rem;
        border: 1px solid var(--border-color);
      }
      .item-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 0.5rem;
        border-radius: 4px;
        margin-right: 0.5rem;
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .item-input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .save-btn,
      .cancel-btn {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .save-btn {
        background: var(--accent);
        color: white;
        margin-right: 0.5rem;
      }
      .save-btn:hover {
        opacity: 0.9;
      }
      .cancel-btn {
        background: var(--bg-hover);
        color: var(--text-secondary);
      }
      .cancel-btn:hover {
        background: var(--border-color);
      }

      .delete-item-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
        padding: 0.25rem 0.5rem;
        transition: color 0.2s;
      }
      .delete-item-btn:hover {
        color: #ef4444;
      }

      .items-list {
        margin-top: 0.5rem;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Alle Belege</h1>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Geschäft</th>
              <th></th>
              <th>Kategorie</th>
              <th>Betrag</th>
            </tr>
          </thead>
          <tbody id="receipts-body">
            <tr>
              <td colspan="5" class="empty-state">Lade Belege...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const API_URL = "http://localhost:5000";
      const CATEGORY_COLORS = [
        "#f5a623",
        "#4ade80",
        "#60a5fa",
        "#f472b6",
        "#a78bfa",
        "#fbbf24",
        "#34d399",
        "#818cf8",
      ];
      let labelColorMap = {};

      async function loadReceipts() {
        try {
          const statsRes = await fetch(`${API_URL}/stats`);
          const stats = await statsRes.json();
          const categoryData = stats.category_totals || {};
          const sorted = Object.entries(categoryData).sort(
            (a, b) => b[1] - a[1],
          );
          labelColorMap = {};
          sorted.forEach((e, i) => {
            labelColorMap[e[0]] = CATEGORY_COLORS[i % CATEGORY_COLORS.length];
          });

          const res = await fetch(`${API_URL}/receipts`);
          const receipts = await res.json();
          const tbody = document.getElementById("receipts-body");

          if (receipts.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="5" class="empty-state">Keine Belege vorhanden</td></tr>';
            return;
          }

          tbody.innerHTML = receipts
            .map(
              (r) => `
            <tr data-id="${r.id}" data-labels='${JSON.stringify(r.labels || [])}' class="receipt-row">
              <td><span class="editable" onclick="editField(${r.id}, 'date', this)">${r.date || "-"}</span></td>
              <td><span class="editable" onclick="editField(${r.id}, 'store_name', this)">${r.store_name || "-"}</span></td>
              <td style="text-align: center;">
                <button class="detail-btn" onclick="toggleDetails(${r.id}, event)" title="Details anzeigen">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
              </td>
              <td>${renderCategories(r.id, r.labels)}</td>
              <td><span class="editable" onclick="editField(${r.id}, 'total', this)">${r.total ? r.total.toFixed(2) + " \u20ac" : "-"}</span></td>
            </tr>
            <tr id="details-${r.id}" class="detail-row" style="display: none;">
              <td colspan="5">
                <div class="detail-content">
                  <div class="detail-section">
                    <div class="detail-header">
                      <strong>Artikel:</strong>
                      <button class="add-item-btn" onclick="showAddItemForm(${r.id})" title="Artikel hinzufügen">+ Artikel</button>
                    </div>
                    <div id="items-${r.id}" class="items-list">
                      ${renderItemsDetailEditable(r.id, r.items)}
                    </div>
                    <div id="add-item-form-${r.id}" class="add-item-form" style="display: none;">
                      <input type="text" id="item-name-${r.id}" placeholder="Artikelname" class="item-input" />
                      <input type="number" id="item-price-${r.id}" placeholder="Preis" step="0.01" class="item-input" />
                      <button onclick="saveNewItem(${r.id})" class="save-btn">Speichern</button>
                      <button onclick="cancelAddItem(${r.id})" class="cancel-btn">Abbrechen</button>
                    </div>
                  </div>
                </div>
              </td>
            </tr>
          `,
            )
            .join("");
        } catch (e) {
          document.getElementById("receipts-body").innerHTML =
            '<tr><td colspan="5" class="empty-state">Fehler beim Laden</td></tr>';
        }
      }

      function renderItemsDetail(items) {
        if (!items || items.length === 0) {
          return '<span style="color: var(--text-muted);">Keine Artikel</span>';
        }
        return (
          '<div style="margin-top: 0.5rem;">' +
          items
            .map(
              (item) =>
                `<div style="padding: 0.35rem 0; border-bottom: 1px solid var(--border-color);"><span style="font-weight: 500;">${item.name || "-"}</span> <span style="color: var(--text-muted); float: right;">${item.price || ""}</span></div>`,
            )
            .join("") +
          "</div>"
        );
      }

      function renderItemsDetailEditable(receiptId, items) {
        if (!items || items.length === 0) {
          return '<span style="color: var(--text-muted);">Keine Artikel</span>';
        }
        return (
          '<div style="margin-top: 0.5rem;">' +
          items
            .map(
              (item) =>
                `<div style="padding: 0.35rem 0; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 500;">${item.name || "-"}</span>
                <div>
                  <span style="color: var(--text-muted); margin-right: 1rem;">${item.price || ""}</span>
                  <button class="delete-item-btn" onclick="deleteItem(${receiptId}, ${item.id})" title="Löschen">×</button>
                </div>
              </div>`,
            )
            .join("") +
          "</div>"
        );
      }

      function showAddItemForm(receiptId) {
        const form = document.getElementById(`add-item-form-${receiptId}`);
        form.style.display = "block";
        document.getElementById(`item-name-${receiptId}`).focus();
      }

      function cancelAddItem(receiptId) {
        const form = document.getElementById(`add-item-form-${receiptId}`);
        form.style.display = "none";
        document.getElementById(`item-name-${receiptId}`).value = "";
        document.getElementById(`item-price-${receiptId}`).value = "";
      }

      async function saveNewItem(receiptId) {
        const name = document
          .getElementById(`item-name-${receiptId}`)
          .value.trim();
        const price = document.getElementById(`item-price-${receiptId}`).value;

        if (!name) {
          alert("Bitte Artikelname eingeben");
          return;
        }

        try {
          const res = await fetch(`${API_URL}/receipts/${receiptId}/items`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, price: parseFloat(price) || 0 }),
          });

          if (res.ok) {
            cancelAddItem(receiptId);
            await loadReceipts(); // Reload to show updated total
          }
        } catch (e) {
          alert("Fehler beim Hinzufügen des Artikels");
        }
      }

      async function deleteItem(receiptId, itemId) {
        if (!confirm("Artikel wirklich löschen?")) {
          return;
        }

        try {
          const res = await fetch(
            `${API_URL}/receipts/${receiptId}/items/${itemId}`,
            {
              method: "DELETE",
            },
          );

          if (res.ok) {
            await loadReceipts(); // Reload to show updated total
          }
        } catch (e) {
          alert("Fehler beim Löschen des Artikels");
        }
      }

      function toggleDetails(id, event) {
        event.stopPropagation();
        const detailRow = document.getElementById(`details-${id}`);
        const btn = event.currentTarget;
        const svg = btn.querySelector("svg");

        if (detailRow.style.display === "none") {
          detailRow.style.display = "table-row";
          svg.style.transform = "rotate(180deg)";
        } else {
          detailRow.style.display = "none";
          svg.style.transform = "rotate(0deg)";
        }
      }

      function renderCategories(id, labels) {
        const tags = (labels || [])
          .map((l) => {
            const color = labelColorMap[l] || "#f5a623";
            return `<span class="category-tag" style="background: ${color}20; color: ${color}">${l} <button class="delete-tag-btn" onclick="deleteLabel(${id}, '${l.replace(/'/g, "\\'")}', event)" title="Entfernen">×</button></span>`;
          })
          .join("");
        return (
          tags +
          `<span class="add-category" onclick="addCategory(${id}, this)" title="Labels hinzufügen (kommagetrennt)">+</span>`
        );
      }

      function editField(id, field, el) {
        const currentValue = el.textContent.replace(" €", "").trim();
        const input = document.createElement("input");
        input.className = "edit-input";
        input.value = currentValue === "-" ? "" : currentValue;
        el.replaceWith(input);
        input.focus();
        input.select();

        const save = async () => {
          const payload = {};
          payload[field] = input.value.trim() || null;
          await fetch(`${API_URL}/receipts/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          loadReceipts();
        };

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") save();
          if (e.key === "Escape") loadReceipts();
        });
        input.addEventListener("blur", save);
      }

      function addCategory(id, el) {
        const row = document.querySelector(`tr[data-id="${id}"]`);
        const labelsData = row ? JSON.parse(row.dataset.labels || "[]") : [];

        const input = document.createElement("input");
        input.className = "edit-input";
        input.style.width = "150px";
        input.placeholder = "Labels (kommagetrennt)";
        el.replaceWith(input);
        input.focus();

        const save = async () => {
          if (input.value.trim()) {
            // Parse comma-separated labels
            const newLabels = input.value
              .split(",")
              .map((l) => l.trim())
              .filter((l) => l);

            // Merge with existing labels (avoid duplicates)
            const allLabels = [...new Set([...labelsData, ...newLabels])];

            await fetch(`${API_URL}/receipts/${id}/labels`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ labels: allLabels }),
            });
          }
          loadReceipts();
        };

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") save();
          if (e.key === "Escape") loadReceipts();
        });
        input.addEventListener("blur", save);
      }

      async function deleteLabel(id, label, event) {
        event.stopPropagation();
        const row = document.querySelector(`tr[data-id="${id}"]`);
        const labelsData = row ? JSON.parse(row.dataset.labels || "[]") : [];

        // Remove the label
        const newLabels = labelsData.filter((l) => l !== label);

        await fetch(`${API_URL}/receipts/${id}/labels`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ labels: newLabels }),
        });

        loadReceipts();
      }

      // Dark mode
      const themeToggle = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");
      function setTheme(dark) {
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "dark" : "light",
        );
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeIcon.innerHTML = dark
          ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
          : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      }
      if (localStorage.getItem("theme") === "dark") setTheme(true);
      themeToggle.addEventListener("click", () =>
        setTheme(
          document.documentElement.getAttribute("data-theme") !== "dark",
        ),
      );

      loadReceipts();
    </script>
  </body>
</html>
