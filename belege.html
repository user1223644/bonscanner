<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alle Belege | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      if (localStorage.getItem("theme") === "dark")
        document.documentElement.setAttribute("data-theme", "dark");
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-card: #fff;
        --bg-hover: #fafafa;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-color: #eee;
        --border-light: #f0f0f0;
        --accent: #f5a623;
        --accent-bg: #fff8f0;
      }

      [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border-color: #30363d;
        --border-light: #21262d;
        --accent: #f5a623;
        --accent-bg: rgba(245, 166, 35, 0.15);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      .logo-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .nav-menu {
        list-style: none;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .theme-toggle {
        background: var(--bg-hover);
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        margin-top: auto;
      }
      .theme-toggle:hover {
        background: var(--border-color);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .table-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 500;
        background: var(--bg-hover);
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .editable {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .editable:hover {
        background: var(--bg-hover);
      }

      .edit-input {
        padding: 0.25rem 0.5rem;
        border: 1px solid var(--accent);
        border-radius: 4px;
        font-size: 0.85rem;
        background: var(--bg-card);
        color: var(--text-primary);
        width: 100%;
        outline: none;
      }

      .category-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-right: 0.25rem;
      }

      .add-category {
        display: inline-block;
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .add-category:hover {
        background: var(--border-color);
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="index.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Alle Belege</h1>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Geschäft</th>
              <th>Kategorie</th>
              <th>Betrag</th>
            </tr>
          </thead>
          <tbody id="receipts-body">
            <tr>
              <td colspan="4" class="empty-state">Lade Belege...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const API_URL = "http://localhost:5000";
      const CATEGORY_COLORS = [
        "#f5a623",
        "#4ade80",
        "#60a5fa",
        "#f472b6",
        "#a78bfa",
        "#fbbf24",
        "#34d399",
        "#818cf8",
      ];
      let labelColorMap = {};

      async function loadReceipts() {
        try {
          const statsRes = await fetch(`${API_URL}/stats`);
          const stats = await statsRes.json();
          const categoryData = stats.category_totals || {};
          const sorted = Object.entries(categoryData).sort(
            (a, b) => b[1] - a[1],
          );
          labelColorMap = {};
          sorted.forEach((e, i) => {
            labelColorMap[e[0]] = CATEGORY_COLORS[i % CATEGORY_COLORS.length];
          });

          const res = await fetch(`${API_URL}/receipts`);
          const receipts = await res.json();
          const tbody = document.getElementById("receipts-body");

          if (receipts.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="4" class="empty-state">Keine Belege vorhanden</td></tr>';
            return;
          }

          tbody.innerHTML = receipts
            .map(
              (r) => `
            <tr data-id="${r.id}">
              <td><span class="editable" onclick="editField(${r.id}, 'date', this)">${r.date || "-"}</span></td>
              <td><span class="editable" onclick="editField(${r.id}, 'store_name', this)">${r.store_name || "-"}</span></td>
              <td>${renderCategories(r.id, r.labels)}</td>
              <td><span class="editable" onclick="editField(${r.id}, 'total', this)">${r.total ? r.total.toFixed(2) + " €" : "-"}</span></td>
            </tr>
          `,
            )
            .join("");
        } catch (e) {
          document.getElementById("receipts-body").innerHTML =
            '<tr><td colspan="4" class="empty-state">Fehler beim Laden</td></tr>';
        }
      }

      function renderCategories(id, labels) {
        const tags = (labels || [])
          .map((l) => {
            const color = labelColorMap[l] || "#f5a623";
            return `<span class="category-tag" style="background: ${color}20; color: ${color}">${l}</span>`;
          })
          .join("");
        return (
          tags +
          `<span class="add-category" onclick="addCategory(${id}, this)">+</span>`
        );
      }

      function editField(id, field, el) {
        const currentValue = el.textContent.replace(" €", "").trim();
        const input = document.createElement("input");
        input.className = "edit-input";
        input.value = currentValue === "-" ? "" : currentValue;
        el.replaceWith(input);
        input.focus();
        input.select();

        const save = async () => {
          const payload = {};
          payload[field] = input.value.trim() || null;
          await fetch(`${API_URL}/receipts/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          loadReceipts();
        };

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") save();
          if (e.key === "Escape") loadReceipts();
        });
        input.addEventListener("blur", save);
      }

      function addCategory(id, el) {
        const input = document.createElement("input");
        input.className = "edit-input";
        input.style.width = "80px";
        input.placeholder = "Kategorie";
        el.replaceWith(input);
        input.focus();

        const save = async () => {
          if (input.value.trim()) {
            await fetch(`${API_URL}/receipts/${id}/labels`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ labels: [input.value.trim()] }),
            });
          }
          loadReceipts();
        };

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") save();
          if (e.key === "Escape") loadReceipts();
        });
        input.addEventListener("blur", save);
      }

      // Dark mode
      const themeToggle = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");
      function setTheme(dark) {
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "dark" : "light",
        );
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeIcon.innerHTML = dark
          ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
          : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      }
      if (localStorage.getItem("theme") === "dark") setTheme(true);
      themeToggle.addEventListener("click", () =>
        setTheme(
          document.documentElement.getAttribute("data-theme") !== "dark",
        ),
      );

      loadReceipts();
    </script>
  </body>
</html>
