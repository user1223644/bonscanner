<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hochladen | Bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="static/js/core/theme-init.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #f5f5f5;
        --bg-card: #fff;
        --bg-hover: #fafafa;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-color: #eee;
        --border-light: #f0f0f0;
        --accent: #f5a623;
        --accent-bg: #fff8f0;
        --success: #22c55e;
        --success-bg: rgba(34, 197, 94, 0.08);
      }

      [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border-color: #30363d;
        --border-light: #21262d;
        --accent: #f5a623;
        --accent-bg: rgba(245, 166, 35, 0.15);
        --success: #22c55e;
        --success-bg: rgba(34, 197, 94, 0.14);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      .logo-sub {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .nav-menu {
        list-style: none;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      .theme-toggle {
        background: var(--bg-hover);
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        margin-top: auto;
      }
      .theme-toggle:hover {
        background: var(--border-color);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 220px;
        min-height: 100vh;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
      }

      /* Split Layout */
      .split-layout {
        display: grid;
        grid-template-columns: minmax(0, 480px) minmax(0, 1fr);
        gap: 2rem;
        align-items: start;
      }

      .upload-column {
        min-width: 0;
      }

      .recent-column {
        min-width: 0;
      }

      .upload-area {
        background: var(--bg-card);
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        padding: 4rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        max-width: 600px;
      }
      .upload-area:hover {
        border-color: var(--accent);
      }
      .upload-area.dragover {
        border-color: var(--accent);
        background: var(--accent-bg);
        box-shadow:
          0 0 0 4px rgba(245, 166, 35, 0.14),
          0 12px 40px rgba(245, 166, 35, 0.12);
        animation: dragGlow 1.15s ease-in-out infinite alternate;
      }
      .upload-icon {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--accent);
      }
      .upload-text {
        font-weight: 500;
        margin-bottom: 0.5rem;
      }
      .upload-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #file-input {
        display: none;
      }

      .preview-container {
        display: none;
        margin-top: 1.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        max-width: 600px;
      }
      .preview-container.active {
        display: block;
      }
      .preview-img {
        max-width: 100%;
        max-height: 250px;
        border-radius: 4px;
        display: block;
        margin: 0 auto;
      }

      .results {
        display: none;
        margin-top: 2rem;
        max-width: 600px;
      }
      .results.active {
        display: block;
      }
      .result-section {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .result-section h3 {
        font-size: 0.8rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }
      .result-value {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .items-list {
        list-style: none;
      }
      .items-list li {
        display: flex;
        justify-content: space-between;
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.95rem;
      }
      .items-list li:last-child {
        border-bottom: none;
      }
      .item-price {
        color: var(--accent);
        font-weight: 600;
      }

      .raw-text {
        background: var(--bg-hover);
        padding: 1rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
        max-height: 180px;
        overflow-y: auto;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      .loading {
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes dragGlow {
        from {
          box-shadow:
            0 0 0 2px rgba(245, 166, 35, 0.12),
            0 8px 30px rgba(245, 166, 35, 0.08);
        }
        to {
          box-shadow:
            0 0 0 6px rgba(245, 166, 35, 0.16),
            0 12px 45px rgba(245, 166, 35, 0.16);
        }
      }

      .loading-text {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .progress {
        width: min(420px, 100%);
        height: 8px;
        margin: 1rem auto 0;
        background: var(--bg-hover);
        border: 1px solid var(--border-color);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          rgba(245, 166, 35, 0.6),
          var(--accent),
          rgba(245, 166, 35, 0.6)
        );
        background-size: 200% 100%;
        border-radius: inherit;
        transition: width 0.2s ease;
        animation: progressShimmer 1.1s linear infinite;
      }

      .progress.indeterminate .progress-fill {
        width: 40%;
        transition: none;
        animation:
          progressIndeterminate 1.2s ease-in-out infinite,
          progressShimmer 1.1s linear infinite;
      }

      @keyframes progressShimmer {
        to {
          background-position: 200% 0;
        }
      }

      @keyframes progressIndeterminate {
        from {
          transform: translateX(-120%);
        }
        to {
          transform: translateX(220%);
        }
      }

      .error {
        background: #fff5f5;
        border: 1px solid #ffdddd;
        color: #cc3333;
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        font-size: 0.9rem;
      }

      /* Label Input */
      .label-section {
        display: none;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.25rem;
        margin-top: 1.5rem;
        max-width: 600px;
      }
      .label-section.active {
        display: block;
      }
      .label-section h3 {
        font-size: 0.8rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }
      .label-input-wrapper {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .label-input {
        flex: 1;
        min-width: 150px;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 0.9rem;
        outline: none;
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .label-input:focus {
        border-color: var(--accent);
      }
      .label-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        background: var(--accent-bg);
        color: var(--accent);
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .label-tag button {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0;
      }
      .label-suggestions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }
      .label-suggestion {
        background: var(--bg-hover);
        border: none;
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.2s;
        color: var(--text-primary);
      }
      .label-suggestion:hover {
        background: var(--border-color);
      }

      .success-toast {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        padding: 0.9rem 1rem;
        margin-bottom: 1rem;
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid rgba(34, 197, 94, 0.25);
        border-left: 4px solid var(--success);
        animation: toastIn 240ms ease-out both;
      }

      .success-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--success-bg);
        border: 1px solid rgba(34, 197, 94, 0.25);
        flex: 0 0 auto;
      }

      .success-icon svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: var(--success);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .success-icon path {
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: checkDraw 420ms ease-out 120ms forwards;
      }

      .success-title {
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 0.1rem;
      }

      .success-subtitle {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes checkDraw {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* Letzte Belege Panel */
      .recent-card {
        background: var(--bg-card);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
        position: sticky;
        top: 2rem;
      }

      .recent-header {
        padding: 1rem 1rem 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        border-bottom: 1px solid var(--border-color);
      }

      .recent-title {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .recent-link {
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-decoration: none;
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .recent-link:hover {
        background: var(--bg-hover);
        color: var(--accent);
      }

      .recent-table-wrap {
        max-height: calc(100vh - 220px);
        overflow-x: hidden;
        overflow-y: auto;
      }

      .recent-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .recent-table th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 500;
        background: var(--bg-hover);
        position: sticky;
        top: 0;
        z-index: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .recent-table td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.9rem;
        vertical-align: middle;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .recent-table th:last-child {
        text-align: right;
      }
      .recent-table td:first-child {
        white-space: nowrap;
      }
      .recent-table tbody tr:hover td {
        background: var(--bg-hover);
      }
      .recent-table tr:last-child td {
        border-bottom: none;
      }

      .recent-table tbody {
        transition: opacity 0.15s ease;
      }

      .recent-table tbody.is-refreshing {
        opacity: 0.65;
      }

      .recent-table td:nth-child(2) {
        white-space: nowrap;
      }

      .recent-empty {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--text-muted);
      }

      .recent-amount {
        text-align: right;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        color: var(--text-primary);
      }

      .editable {
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        transition: background 0.2s;
      }
      .editable:hover {
        background: var(--bg-hover);
      }

      .edit-input {
        -webkit-appearance: none;
        appearance: none;
        box-sizing: border-box;
        font: inherit;
        line-height: inherit;
        padding: 0.25rem 0.5rem;
        border: 0;
        box-shadow: 0 0 0 1px var(--accent);
        border-radius: 4px;
        background: var(--bg-card);
        color: var(--text-primary);
        width: 100%;
        min-width: 0;
        max-width: 100%;
        margin: 0;
        vertical-align: middle;
        outline: none;
      }

      .category-tag {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-right: 0.25rem;
      }

      .add-category {
        display: inline-block;
        background: var(--bg-hover);
        color: var(--text-muted);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .add-category:hover {
        background: var(--border-color);
      }

      .delete-tag-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.6;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0 0 0 0.25rem;
        margin-left: 0.25rem;
        transition: opacity 0.2s;
      }
      .delete-tag-btn:hover {
        opacity: 1;
      }

      .cell-muted {
        color: var(--text-muted);
      }

      /* Make upload column fill available space in split layout */
      .split-layout .upload-area,
      .split-layout .preview-container,
      .split-layout .label-section,
      .split-layout .results {
        max-width: 100%;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
      }

      @media (max-width: 1200px) {
        .split-layout {
          grid-template-columns: 1fr;
        }
        .recent-card {
          position: static;
        }
        .recent-table-wrap {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">~/bonscanner</div>
      <div class="logo-sub">Belegscanner</div>
      <ul class="nav-menu">
        <li>
          <a href="stats.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M3 3v18h18" />
              <path d="M18 9l-5 5-4-4-3 3" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="belege.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="16" y2="17" />
            </svg>
            Belege
          </a>
        </li>
        <li>
          <a href="kategorien.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 4h7v7H4z" />
              <path d="M13 4h7v7h-7z" />
              <path d="M4 13h7v7H4z" />
              <path d="M13 13h7v7h-7z" />
            </svg>
            Kategorien
          </a>
        </li>
        <li>
          <a href="regeln.html" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>
            Regeln
          </a>
        </li>
        <li>
          <a href="hochladen.html" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Hochladen
          </a>
        </li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Dunkel-/Hellmodus">
        <svg viewBox="0 0 24 24" id="theme-icon">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      </button>
    </aside>

    <main class="main">
      <h1>Beleg hochladen</h1>

      <div class="split-layout">
        <section class="upload-column">
          <div class="upload-area" id="upload-area">
            <input type="file" id="file-input" accept="image/*" />
            <div class="upload-icon">↑</div>
            <p class="upload-text">Datei hier ablegen oder klicken</p>
            <p class="upload-hint">Unterstützt: JPG, PNG, WEBP</p>
          </div>

          <div class="preview-container" id="preview-container">
            <img id="preview-img" class="preview-img" src="" alt="Vorschau" />
          </div>

          <div class="label-section" id="label-section">
            <h3>Kategorie</h3>
            <div class="label-input-wrapper">
              <div id="selected-labels"></div>
              <input
                type="text"
                class="label-input"
                id="label-input"
                placeholder="Kategorie eingeben..."
              />
            </div>
            <div class="label-suggestions" id="label-suggestions"></div>
          </div>

          <div class="results" id="results"></div>
        </section>

        <aside class="recent-column">
          <div class="recent-card">
            <div class="recent-header">
              <div class="recent-title">Letzte Belege</div>
              <a class="recent-link" href="belege.html">Alle anzeigen</a>
            </div>
            <div class="recent-table-wrap" aria-label="Letzte Belege">
              <table class="recent-table">
                <thead>
                  <tr>
                    <th>Datum</th>
                    <th>Geschäft</th>
                    <th>Kategorie</th>
                    <th>Betrag</th>
                  </tr>
                </thead>
                <tbody id="recent-receipts-body">
                  <tr>
                    <td colspan="4" class="recent-empty">Lade Belege...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script src="static/js/core/constants.js" defer></script>
    <script src="static/js/core/api.js" defer></script>
    <script src="static/js/core/theme.js" defer></script>
    <script src="static/js/features/recent-receipts.js" defer></script>
    <script src="static/js/features/upload.js" defer></script>
  </body>
</html>
