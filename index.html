<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bonscanner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #fafafa;
        color: #1a1a1a;
        min-height: 100vh;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background: #fff;
        border-bottom: 1px solid #eee;
      }

      .logo {
        font-weight: 600;
        font-size: 1rem;
        color: #f5a623;
      }

      .nav-links {
        display: flex;
        gap: 1.5rem;
      }
      .nav-links a {
        color: #666;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .nav-links a:hover {
        color: #f5a623;
      }
      .nav-links a.active {
        color: #f5a623;
        font-weight: 500;
      }

      .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 3rem 2rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 2rem;
        color: #1a1a1a;
      }

      .upload-area {
        background: #fff;
        border: 2px dashed #ddd;
        border-radius: 8px;
        padding: 4rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .upload-area:hover {
        border-color: #f5a623;
      }

      .upload-area.dragover {
        border-color: #f5a623;
        background: #fffbf5;
      }

      .upload-icon {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #f5a623;
      }

      .upload-text {
        font-weight: 500;
        color: #1a1a1a;
        margin-bottom: 0.5rem;
      }

      .upload-hint {
        font-size: 0.8rem;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      #file-input {
        display: none;
      }

      .preview-container {
        display: none;
        margin-top: 1.5rem;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 1rem;
      }

      .preview-container.active {
        display: block;
      }

      .preview-img {
        max-width: 100%;
        max-height: 250px;
        border-radius: 4px;
        display: block;
        margin: 0 auto;
      }

      .results {
        display: none;
        margin-top: 2rem;
      }

      .results.active {
        display: block;
      }

      .result-section {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }

      .result-section h3 {
        font-size: 0.8rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #f5a623;
        margin-bottom: 0.75rem;
      }

      .result-value {
        font-size: 1.1rem;
        font-weight: 600;
        color: #1a1a1a;
      }

      .items-list {
        list-style: none;
      }

      .items-list li {
        display: flex;
        justify-content: space-between;
        padding: 0.6rem 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 0.95rem;
      }

      .items-list li:last-child {
        border-bottom: none;
      }

      .item-price {
        color: #f5a623;
        font-weight: 600;
      }

      .raw-text {
        background: #fafafa;
        padding: 1rem;
        border-radius: 4px;
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
        max-height: 180px;
        overflow-y: auto;
        color: #666;
        line-height: 1.5;
      }

      .loading {
        text-align: center;
        padding: 2rem;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #eee;
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        color: #666;
        font-size: 0.9rem;
      }

      .error {
        background: #fff5f5;
        border: 1px solid #ffdddd;
        color: #cc3333;
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        font-size: 0.9rem;
      }

      /* Label Input */
      .label-section {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 1.25rem;
        margin-top: 1.5rem;
      }

      .label-section h3 {
        font-size: 0.8rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #f5a623;
        margin-bottom: 0.75rem;
      }

      .label-input-wrapper {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .label-input {
        flex: 1;
        min-width: 150px;
        padding: 0.5rem 0.75rem;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 0.9rem;
        outline: none;
      }

      .label-input:focus {
        border-color: #f5a623;
      }

      .label-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        background: #fff8f0;
        color: #f5a623;
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 500;
      }

      .label-tag button {
        background: none;
        border: none;
        color: #f5a623;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 0;
      }

      .label-suggestions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .label-suggestion {
        background: #f5f5f5;
        border: none;
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .label-suggestion:hover {
        background: #eee;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">~/bonscanner</a>
      <div class="nav-links">
        <a href="index.html" class="active">Upload</a>
        <a href="stats.html">Statistiken</a>
      </div>
    </nav>

    <div class="container">
      <h1>bonscanner</h1>

      <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept="image/*" />
        <div class="upload-icon">↑</div>
        <p class="upload-text">Datei hier ablegen oder klicken</p>
        <p class="upload-hint">Unterstützt: JPG, PNG, WEBP</p>
      </div>

      <div class="preview-container" id="preview-container">
        <img src="" alt="Vorschau" class="preview-img" id="preview-img" />
      </div>

      <div class="label-section" id="label-section" style="display: none">
        <h3>Kategorien</h3>
        <div class="label-input-wrapper">
          <div id="selected-labels"></div>
          <input
            type="text"
            class="label-input"
            id="label-input"
            placeholder="Kategorie eingeben..."
          />
        </div>
        <div class="label-suggestions" id="label-suggestions"></div>
      </div>

      <div class="results" id="results"></div>
    </div>

    <script>
      const API_URL = "http://localhost:5000";

      const uploadArea = document.getElementById("upload-area");
      const fileInput = document.getElementById("file-input");
      const previewContainer = document.getElementById("preview-container");
      const previewImg = document.getElementById("preview-img");
      const results = document.getElementById("results");
      const labelSection = document.getElementById("label-section");
      const labelInput = document.getElementById("label-input");
      const selectedLabelsEl = document.getElementById("selected-labels");
      const labelSuggestions = document.getElementById("label-suggestions");

      let selectedLabels = [];
      let availableLabels = [];
      let pendingFile = null;

      // Load existing labels
      async function loadLabels() {
        try {
          const res = await fetch(`${API_URL}/labels`);
          availableLabels = await res.json();
          renderSuggestions();
        } catch (e) {
          console.error("Failed to load labels", e);
        }
      }

      function renderSuggestions() {
        const unused = availableLabels.filter(
          (l) => !selectedLabels.includes(l),
        );
        labelSuggestions.innerHTML = unused
          .slice(0, 8)
          .map(
            (l) =>
              `<button type="button" class="label-suggestion" onclick="addLabel('${l}')">${l}</button>`,
          )
          .join("");
      }

      function renderSelectedLabels() {
        selectedLabelsEl.innerHTML = selectedLabels
          .map(
            (l) =>
              `<span class="label-tag">${l}<button type="button" onclick="removeLabel('${l}')">&times;</button></span>`,
          )
          .join("");
        renderSuggestions();
      }

      function addLabel(label) {
        label = label.trim();
        if (label && !selectedLabels.includes(label)) {
          selectedLabels.push(label);
          renderSelectedLabels();
        }
        labelInput.value = "";
      }

      function removeLabel(label) {
        selectedLabels = selectedLabels.filter((l) => l !== label);
        renderSelectedLabels();
      }

      labelInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === ",") {
          e.preventDefault();
          addLabel(labelInput.value);
        }
      });

      uploadArea.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          showPreview(e.target.files[0]);
        }
      });

      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });

      uploadArea.addEventListener("dragleave", () => {
        uploadArea.classList.remove("dragover");
      });

      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        if (e.dataTransfer.files.length > 0) {
          showPreview(e.dataTransfer.files[0]);
        }
      });

      function showPreview(file) {
        pendingFile = file;
        previewImg.src = URL.createObjectURL(file);
        previewContainer.classList.add("active");
        labelSection.style.display = "block";
        selectedLabels = [];
        renderSelectedLabels();

        // Auto-submit after brief delay for label selection
        setTimeout(() => {
          if (pendingFile === file) {
            handleFile(file);
          }
        }, 100);
      }

      async function handleFile(file) {
        results.classList.add("active");
        results.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">Bon wird gescannt...</p>
                </div>
            `;

        try {
          const formData = new FormData();
          formData.append("image", file);
          selectedLabels.forEach((l) => formData.append("labels", l));

          const response = await fetch(`${API_URL}/scan`, {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.error) {
            throw new Error(data.error);
          }

          displayResults(data);
        } catch (error) {
          results.innerHTML = `<div class="error">Fehler: ${error.message}</div>`;
        }
      }

      function displayResults(data) {
        let itemsHtml = "";
        if (data.items && data.items.length > 0) {
          itemsHtml = `
                    <div class="result-section">
                        <h3>Posten</h3>
                        <ul class="items-list">
                            ${data.items
                              .map(
                                (item) => `
                                <li>
                                    <span>${item.name}</span>
                                    <span class="item-price">${item.price} €</span>
                                </li>
                            `,
                              )
                              .join("")}
                        </ul>
                    </div>
                `;
        }

        results.innerHTML = `
                <div class="result-section">
                    <h3>Datum</h3>
                    <p class="result-value">${data.date || "Nicht gefunden"}</p>
                </div>
                <div class="result-section">
                    <h3>Gesamtsumme</h3>
                    <p class="result-value">${data.total || "Nicht gefunden"}</p>
                </div>
                ${itemsHtml}
                <div class="result-section">
                    <h3>OCR-Rohtext</h3>
                    <pre class="raw-text">${data.raw_text || "Kein Text erkannt"}</pre>
                </div>
            `;
      }

      loadLabels();
    </script>
  </body>
</html>
